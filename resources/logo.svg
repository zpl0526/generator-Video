<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <!-- hex stroke: bright top → deep bottom (light from above) -->
    <linearGradient id="zpl-stroke" x1="0" y1="0" x2="0" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%"  stop-color="#7dd3fc"/>
      <stop offset="40%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>

    <!-- hex face: radial dome highlight, top-left lit -->
    <radialGradient id="zpl-fill" cx="38%" cy="22%" r="85%">
      <stop offset="0%"   stop-color="#c7d2fe" stop-opacity="0.55"/>
      <stop offset="45%"  stop-color="#4f46e5" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#1e1b4b" stop-opacity="0.30"/>
    </radialGradient>

    <!-- Z front face: cyan-white top → deep violet bottom (extrusion lighting) -->
    <linearGradient id="zpl-z" x1="0" y1="18" x2="0" y2="46" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#e0f2fe"/>
      <stop offset="22%"  stop-color="#67e8f9"/>
      <stop offset="55%"  stop-color="#a78bfa"/>
      <stop offset="85%"  stop-color="#6d28d9"/>
      <stop offset="100%" stop-color="#3b0764"/>
    </linearGradient>

    <!-- Z specular gleam: white sheen fades down -->
    <linearGradient id="zpl-gleam" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="55%"  stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- soft glow halo -->
    <filter id="zpl-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="0.9" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- drop shadow filter for ambient lift -->
    <filter id="zpl-drop" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.2"/>
      <feOffset dx="0" dy="1.4" result="o"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.55"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- clip the hex face so any overflow specular is contained -->
    <clipPath id="zpl-hex-clip">
      <polygon points="32,3 57,17.5 57,46.5 32,61 7,46.5 7,17.5"/>
    </clipPath>
  </defs>

  <!-- 1. extruded back face (depth shadow under hex) -->
  <polygon points="32,4.5 58,18.5 58,47.5 32,62.5 6,47.5 6,18.5"
           fill="#1e1b4b" opacity="0.45"
           filter="url(#zpl-drop)"/>

  <!-- 2. main hex face -->
  <polygon points="32,3 57,17.5 57,46.5 32,61 7,46.5 7,17.5"
           fill="url(#zpl-fill)"
           stroke="url(#zpl-stroke)"
           stroke-width="2"
           stroke-linejoin="round"/>

  <!-- 3. translucent specular sheen across top half (glass dome) -->
  <g clip-path="url(#zpl-hex-clip)">
    <ellipse cx="24" cy="14" rx="22" ry="9"
             fill="#ffffff" opacity="0.18"/>
  </g>

  <!-- 4. inner bevel highlight along top edges -->
  <path d="M 9 18.5 L 32 5.2 L 55 18.5"
        fill="none"
        stroke="#bae6fd"
        stroke-opacity="0.75"
        stroke-width="0.9"
        stroke-linecap="round"/>

  <!-- 5. inner bevel shadow along bottom edges -->
  <path d="M 9 46 L 32 59 L 55 46"
        fill="none"
        stroke="#0f0a3d"
        stroke-opacity="0.55"
        stroke-width="0.8"
        stroke-linecap="round"/>

  <!-- 6. inner faint hex grid -->
  <polygon points="32,9 51.5,20.5 51.5,43.5 32,55 12.5,43.5 12.5,20.5"
           fill="none"
           stroke="#a5b4fc"
           stroke-width="0.55"
           stroke-opacity="0.5"
           stroke-dasharray="2 2"/>

  <!-- 7. HUD corner brackets -->
  <g stroke="#22d3ee" stroke-width="1.4" stroke-linecap="round" fill="none" opacity="0.95">
    <path d="M 12 17 L 12 13 L 16 13"/>
    <path d="M 52 47 L 52 51 L 48 51"/>
  </g>

  <!-- 8. circuit nodes -->
  <g>
    <circle cx="9.5" cy="32" r="1.3" fill="#67e8f9"/>
    <circle cx="9.5" cy="32" r="0.6" fill="#ffffff"/>
    <circle cx="54.5" cy="32" r="1.3" fill="#67e8f9"/>
    <circle cx="54.5" cy="32" r="0.6" fill="#ffffff"/>
    <circle cx="32" cy="6.5" r="1" fill="#c4b5fd"/>
    <circle cx="32" cy="57.5" r="1" fill="#c4b5fd"/>
  </g>

  <!-- 9. Z extruded shadow (offset back face) -->
  <path d="M 19 21.5 L 47 21.5 L 47 26.5 L 29.5 40.5 L 47 40.5 L 47 45.5 L 19 45.5 L 19 40.5 L 36.5 26.5 L 19 26.5 Z"
        fill="#1e1b4b"
        opacity="0.55"/>

  <!-- 10. Z front face with glow + drop -->
  <g filter="url(#zpl-glow)">
    <path d="M 18 20 L 46 20 L 46 25 L 28.5 39 L 46 39 L 46 44 L 18 44 L 18 39 L 35.5 25 L 18 25 Z"
          fill="url(#zpl-z)"
          stroke="#ffffff"
          stroke-opacity="0.6"
          stroke-width="0.55"
          stroke-linejoin="miter"/>
  </g>

  <!-- 11. Z top bevel highlight (top edge sheen) -->
  <path d="M 18 20.6 L 46 20.6"
        stroke="#ffffff"
        stroke-opacity="0.85"
        stroke-width="0.7"
        stroke-linecap="round"/>

  <!-- 12. Z bottom bevel shadow (under-edge) -->
  <path d="M 18 43.5 L 46 43.5"
        stroke="#1e1b4b"
        stroke-opacity="0.55"
        stroke-width="0.7"
        stroke-linecap="round"/>

  <!-- 13. specular gleam on Z top bar -->
  <rect x="18" y="20" width="28" height="2.6"
        fill="url(#zpl-gleam)"/>

  <!-- 14. scanline accent through diagonal -->
  <line x1="22" y1="32" x2="42" y2="32"
        stroke="#22d3ee"
        stroke-width="0.8"
        stroke-opacity="0.7"
        stroke-dasharray="1.5 2"/>
</svg>
